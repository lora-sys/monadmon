name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts (forge fmt + build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Show toolchain
        run: forge --version
      - name: Cache forge libs
        uses: actions/cache@v4
        with:
          path: |
            contracts/lib
            contracts/cache
            contracts/out
          key: ${{ runner.os }}-forge-${{ hashFiles('contracts/foundry.toml') }}
          restore-keys: |
            ${{ runner.os }}-forge-
      - name: Install dependencies
        working-directory: contracts
        run: |
          if [ ! -d lib/openzeppelin-contracts ]; then
            forge install foundry-rs/forge-std --no-git
            forge install OpenZeppelin/openzeppelin-contracts@v5.1.0 --no-git
          fi
      - name: Format check
        working-directory: contracts
        run: forge fmt --check
      - name: Build
        working-directory: contracts
        run: forge build --sizes
      - name: Test
        working-directory: contracts
        run: forge test -vv
      - name: Coverage
        working-directory: contracts
        run: forge coverage
        continue-on-error: true

  frontend:
    name: Frontend (lint + type-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build
        working-directory: frontend
        run: npm run build

  backend:
    name: Backend (type-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install
        working-directory: backend
        run: npm ci --no-audit --no-fund
      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit
      - name: Build
        working-directory: backend
        run: npx tsc -p tsconfig.json
