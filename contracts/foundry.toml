[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
gas_reports = ["MonsterNFT", "ItemNFT", "GenesisMinter", "Battle"]
auto_detect_solc = true
fuzz = { runs = 10_000 }
verbosity = 2

# Monad testnet — pinned chain ID 10143 per docs/architecture/monad.md
[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"
anvil = "http://127.0.0.1:8545"

[etherscan]
# Monadscan explorer URL pinned at deploy time. Empty for now.

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"

[doc]
out = "../docs/contracts"
title = "MonadMon Contracts"
